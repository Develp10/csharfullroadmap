name: Link Check

on:
  push:
    branches: [main]
    paths:
      - '**/*.md'
  pull_request:
    paths:
      - '**/*.md'
  schedule:
    - cron: '0 6 * * 1'  # every Monday at 06:00 UTC

jobs:
  links:
    name: lychee
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Link Checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --max-concurrency 5 --exclude-mail './**/*.md'
          fail: true
